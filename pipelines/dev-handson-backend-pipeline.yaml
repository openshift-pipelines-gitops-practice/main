apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: dev-handson-backend-pipeline
  namespace: dev-handson
  labels:
    app.kubernetes.io/part-of: dev-handson
spec:
  params:
    - name: repo-url
      type: string
      description: ソースリポジトリの HTTPS URL
    - name: revision
      type: string
      description: Git リビジョン (コミットハッシュ)
    - name: manifest-repo-url
      type: string
      description: マニフェストリポジトリの HTTPS URL
    - name: image-registry
      type: string
      default: "image-registry.openshift-image-registry.svc:5000"
    - name: image-namespace
      type: string
    - name: app-name
      type: string
    - name: argocd-app-name
      type: string
      default: "dev-handson-app"
      description: ArgoCD Application 名
  workspaces:
    - name: shared-workspace
    - name: basic-auth
    - name: maven-settings
  tasks:
    # ---------------------------------------------------------
    # 1. ソースコード取得
    # ---------------------------------------------------------
    - name: fetch-source
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      workspaces:
        - name: output
          workspace: shared-workspace
          subPath: source
        - name: basic-auth
          workspace: basic-auth
      params:
        - name: URL
          value: $(params.repo-url)
        - name: REVISION
          value: $(params.revision)

    # ---------------------------------------------------------
    # 2. ユニットテスト (Maven)
    # ---------------------------------------------------------
    - name: unit-test
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: maven
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - fetch-source
      workspaces:
        - name: source
          workspace: shared-workspace
          subPath: source
        - name: maven_settings
          workspace: maven-settings
      params:
        - name: GOALS
          value:
            - "-B"
            - "test"

    # ---------------------------------------------------------
    # 3. コンテナイメージビルド (S2I Java)
    # ---------------------------------------------------------
    - name: build-image
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: s2i-java
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - unit-test
      workspaces:
        - name: source
          workspace: shared-workspace
          subPath: source
      params:
        - name: IMAGE
          value: "$(params.image-registry)/$(params.image-namespace)/$(params.app-name):$(params.revision)"

    # ---------------------------------------------------------
    # 4. マニフェストリポジトリ取得 
    # ---------------------------------------------------------
    - name: fetch-manifest
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - build-image
      workspaces:
        - name: output
          workspace: shared-workspace
          subPath: manifest
        - name: basic-auth
          workspace: basic-auth
      params:
        - name: URL
          value: $(params.manifest-repo-url)
        - name: REVISION
          value: "main"

    # ---------------------------------------------------------
    # 5. マニフェストのイメージタグ更新 & git push
    # ---------------------------------------------------------
    - name: update-manifest
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-cli
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - fetch-manifest
      workspaces:
        - name: source
          workspace: shared-workspace
          subPath: manifest
        - name: basic-auth
          workspace: basic-auth
      params:
        - name: DELETE_EXISTING
          value: "false"
        - name: GIT_USER_NAME
          value: "tekton-pipeline"
        - name: GIT_USER_EMAIL
          value: "tekton@example.com"
        - name: GIT_SCRIPT
          value: |
            pwd
            sed -i 's|newTag: ".*" # backend-image-tag|newTag: "$(params.revision)" # backend-image-tag|' envs/dev/kustomization.yaml
            git add -A
            git diff --cached --quiet && echo "No changes to commit" && exit 0
            git commit -m "[CI] Update backend image to $(params.revision)"
            git push origin HEAD:main

    # ---------------------------------------------------------
    # 6. ArgoCD Sync & Wait
    # ---------------------------------------------------------
    - name: sync-argocd
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: argocd-task-sync-and-wait
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - update-manifest
      params:
        - name: application-name
          value: $(params.argocd-app-name)
        - name: revision
          value: HEAD
