---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: udi-rhel9-java25-node24
  namespace: openshift
spec: {}

---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: udi-rhel9-java25-node24
  namespace: openshift
  labels:
    app: udi-rhel9-java25-node24
spec:
  failedBuildsHistoryLimit: 5
  successfulBuildsHistoryLimit: 5
  nodeSelector: null
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: https://github.com/YOUR_ORG/openshift-pipelines-gitops-practice.git
      ref: main
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: devspaces/Dockerfile
      buildArgs:
        - name: UDI_IMAGE
          value: registry.redhat.io/devspaces/udi-rhel9
        - name: UDI_TAG
          value: latest
  output:
    to:
      kind: ImageStreamTag
      name: udi-rhel9-java25-node24:latest
  triggers:
    - type: ConfigChange
